<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

    <header >
        <div class="container header-inner">

            <div class="logo" href="index.html">
                <img src="img/logo.svg" alt="PinkCake">
            </div>

            <nav class="nav">
            <a href="#">О нас</a>
            <a href="catalog.html">Каталог</a>
            <a href="#">Корзина</a>
            </nav>

            <div class="phone">+7 923 928 82 99</div>

        </div>
    </header>

    <div class="catalog-top">

        <div class="background-img">

            <img src="img/hero_back.png" alt="Фон" width="100%" >

        </div>

        <div class="catalog-background-imgs">

            <img src="img/catalog-back2.png" alt="Фоновая картинка" style="max-width: 50%;">
            <img src="img/catalog-back1.png" alt="Фоновая картинка" style="max-width: 50%;">

        </div>

        <div class="catalog-top-container">
        
            <div class="catalog-top-content">

                <h2 style="margin-right: 20%;">Каталог</h2>

                <div class="catalog-filters">

                    <div class="filter">
                        <h3>Популярные</h3>

                        <label><input type="checkbox"> Новинки</label>
                        <label><input type="checkbox"> Хиты продаж</label>
                        <label><input type="checkbox"> Со скидкой</label>

                    </div>


                    <div class="filter">
                    <h3>Фильтры</h3>

                        <label><input type="checkbox"> Красители</label>
                        <label><input type="checkbox"> Шоколад и глазури</label>
                        <label><input type="checkbox"> Смеси и ингредиенты</label>
                        <label><input type="checkbox"> Формы и инвентарь</label>
                        <label><input type="checkbox"> Декор</label>
                        <label><input type="checkbox"> Упаковка</label>
                        <label><input type="checkbox"> Фотопечать</label>

                    </div>


                    <div class="filter">
                    <h3>Цена</h3>

                        <label><input type="radio" name="price"> до 500 ₽</label>
                        <label><input type="radio" name="price"> до 1000 ₽</label>
                        <label><input type="radio" name="price"> до 1500 ₽</label>

                    </div>
                </div>
             </div>

        </div>
    </div>

    <main>

        <section class="catalog">

                <div class="catalog-grid">


                    <div class="product">

                        <div class="product-image">
                            <img src="img/product1.png">
                            <span class="badge new">Новинка</span>
                        </div>

                        <h4>Капсулы бумажные белые</h4>

                        <div class="price">78 ₽</div>

                        <button class="btn">В корзину</button>

                    </div>



                    <div class="product">

                        <div class="product-image">
                            <img src="img/product2.png">
                            <span class="badge hit">Хит</span>
                        </div>

                        <h4>Малина сублимированная</h4>

                        <div class="price">459 ₽</div>

                        <button class="btn">В корзину</button>

                    </div>



                    <div class="product">

                        <div class="product-image">
                            <img src="img/product3.png">
                            <span class="badge sale">Скидка</span>
                        </div>

                        <h4>Силиконовая форма</h4>

                        <div class="price">

                        <span class="old">342 ₽</span>
                        <span class="new">209 ₽</span>

                        </div>

                        <button class="btn">В корзину</button>

                    </div>


                </div>

            </div>

        </section>
    </main>

</body>
</html>
